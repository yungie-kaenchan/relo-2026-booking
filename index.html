/* ═══ FIREBASE HOOK ═══ */
function useBookings() {
  const [bookings,setBookings]=useState({});
  const [loading,setLoading]=useState(true);
  const [connected,setConnected]=useState(false);

  useEffect(()=>{
    const onData=(snap)=>{setBookings(snap.val()||{});setLoading(false);setConnected(true);};
    const onErr=(e)=>{console.error(e);setLoading(false);setConnected(false);};
    bookingsRef.on("value",onData,onErr);
    const connRef=firebase.database().ref(".info/connected");
    const onConn=(snap)=>{setConnected(!!snap.val());};
    connRef.on("value",onConn);
    return ()=>{bookingsRef.off("value",onData);connRef.off("value",onConn);};
  },[]);

  const book=useCallback(async(slotIds,team,booker)=>{
    const now=new Date().toISOString();
    const u={};slotIds.forEach(id=>{u[id]={team,booker,ts:now};});
    await bookingsRef.update(u);
  },[]);

  const cancelSlot=useCallback(async(slotId)=>{
    await bookingsRef.child(slotId).remove();
  },[]);

  const cancelAll=useCallback(async(slotIds)=>{
    const u={};slotIds.forEach(id=>{u[id]=null;});
    await bookingsRef.update(u);
  },[]);

  return {bookings,loading,connected,book,cancelSlot,cancelAll};
}

}

function SlotSelector({selected,setSelected,bookings,onNext,onBack,slotPool}){
  const pool=slotPool||SLOTS;
  const [filter,setFilter]=useState("all");
  const toggle=useCallback(id=>{setSelected(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);},[setSelected]);
  const grouped=useMemo(()=>{const fl=filter==="all"?pool:pool.filter(s=>s.facilitator===filter);const g={};fl.forEach(s=>{if(!g[s.dateLabel])g[s.dateLabel]={date:s.date,day:s.day,label:s.dateLabel,slots:[]};g[s.dateLabel].slots.push(s);});return Object.values(g).sort((a,b)=>a.date.localeCompare(b.date));},[filter,pool]);
  const avail=pool.filter(s=>!bookings[s.id]).length;const booked=pool.filter(s=>bookings[s.id]).length;
  const poolFacilitators=useMemo(()=>{const ids=[...new Set(pool.map(s=>s.facilitator))];return FACILITATORS.filter(f=>ids.includes(f.id));},[pool]);
  return(
    <div style={S.card} className="fade-up">
      <h3 style={S.cardT}>📅 Available Slots / เลือกเวลาที่สะดวก</h3>
      <p style={{color:"#666",fontSize:14,marginBottom:14,lineHeight:1.6}}>Tap to select. Each session is <strong>30 min</strong> via Zoom. Availability updates <strong>in real time</strong>.<br/><span style={{color:"#999",fontSize:13}}>แตะเพื่อเลือก slot · อัปเดตสถานะแบบเรียลไทม์</span></p>
      <div style={S.statsBar}><div style={S.statItem}><div style={{...S.statDot,background:"#2D6A4F"}}/><span>Available ({avail})</span></div><div style={S.statItem}><div style={{...S.statDot,background:"#C1121F"}}/><span>Booked ({booked})</span></div><div style={S.statItem}><div style={{...S.statDot,background:"#1B4965"}}/><span>Selected ({selected.length})</span></div></div>
      <div style={S.filterRow}>{[{id:"all",label:"All"},...poolFacilitators.map(f=>({id:f.id,label:f.icon+" "+f.name}))].map(o=>(<button key={o.id} onClick={()=>setFilter(o.id)} style={{...S.filterBtn,background:filter===o.id?"#1B4965":"#F0EEEA",color:filter===o.id?"#fff":"#555"}}>{o.label}</button>))}</div>
      {grouped.map(grp=>(<div key={grp.label} style={{marginBottom:24}}><div style={S.dateHdr}><span style={{fontWeight:700,fontSize:16,color:"#1B4965"}}>{grp.label}</span><span style={S.dayBadge}>{grp.day}</span></div><div style={S.grid}>{grp.slots.map(slot=>{const f=FI(slot.facilitator);const isB=!!bookings[slot.id];const isM=selected.includes(slot.id);const bb=bookings[slot.id];return(<button key={slot.id} onClick={()=>!isB&&toggle(slot.id)} disabled={isB} style={{...S.slotBtn,borderColor:isM?f.color:isB?"#E0DCDC":"#E8E6E1",background:isM?f.light:isB?"#F5F3EF":"#fff",opacity:isB?.55:1,cursor:isB?"not-allowed":"pointer",transform:isM?"translateY(-2px)":"none",boxShadow:isM?"0 4px 16px "+f.color+"22":"0 1px 3px rgba(0,0,0,.04)"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><span style={{fontSize:16}}>{f.icon}</span><span style={{fontWeight:700,fontSize:13,color:f.color}}>{f.name}</span>{isM&&<span style={{...S.chk,background:f.color}}>✓</span>}{isB&&<span style={S.bookedTag}>Booked</span>}</div><div style={{fontWeight:700,fontSize:17,color:isB?"#AAA":"#2A2A28"}}>{slot.time}</div><div style={{fontSize:12,color:"#888",marginTop:2}}>{slot.start<"14:00"?"☀️ Morning":"🌙 Evening"}</div>{isB&&<div style={S.lockedTeam}>🔒 {bb.team}</div>}</button>);})}</div></div>))}
      <div style={S.bottomBar}><span style={{fontSize:14,color:"#555"}}><strong style={{color:"#1B4965",fontSize:22}}>{selected.length}</strong> slot{selected.length!==1?"s":""} selected</span><div style={{display:"flex",gap:10}}><button style={S.btnS} onClick={onBack}>← Back</button><button style={{...S.btnP,opacity:selected.length>0?1:.4}} disabled={selected.length===0} onClick={onNext}>Review & Confirm →</button></div></div>
    </div>
  );
}

/* ═══ BOOKING PAGE ═══ */

  const pool=slotPool||SLOTS_R1;
  const [step,setStep]=useState(1);const [team,setTeam]=useState("");const [booker,setBooker]=useState("");const [selected,setSelected]=useState([]);const [confirmed,setConfirmed]=useState(false);const [saving,setSaving]=useState(false);const [error,setError]=useState(null);
  useEffect(()=>{if(!confirmed)setSelected(p=>p.filter(id=>!bookings[id]));},[bookings,confirmed]);
  const handleConfirm=async()=>{setSaving(true);setError(null);try{const taken=selected.filter(id=>bookings[id]);if(taken.length>0){setSelected(p=>p.filter(id=>!bookings[id]));setError("Some slots were just booked by another team! Please re-select. / บาง slot ถูกจองไปแล้ว");setSaving(false);setStep(2);return;}await book(selected,team,booker);setConfirmed(true);window.scrollTo({top:0,behavior:"smooth"});}catch(e){setError("Booking failed. Please try again. / การจองล้มเหลว");}setSaving(false);};
  const handleReset=()=>{setStep(1);setTeam("");setBooker("");setSelected([]);setConfirmed(false);setError(null);};
  if(loading)return <div style={S.card}><p style={{textAlign:"center",color:"#999",padding:32}}>Connecting… / กำลังเชื่อมต่อ…</p></div>;

  if(confirmed){
    const bs=SLOTS.filter(s=>selected.includes(s.id));
    const dlICS=()=>{const b=new Blob([makeICS(bs,team,booker)],{type:"text/calendar"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="RELO2026_"+team.replace(/\s+/g,"_")+".ics";a.click();};
    const copy=()=>{const lines=bs.map(s=>"  • "+s.dateLabel+" ("+s.day+") "+s.time+" — "+FI(s.facilitator).name);navigator.clipboard.writeText("RELO 2026 Showcase — Booking Confirmation\n\nTeam: "+team+"\nBooked by: "+booker+"\n\nSessions:\n"+lines.join("\n")+"\n\nZoom: "+ZOOM.link+"\nMeeting ID: "+ZOOM.id+"\nPasscode: "+ZOOM.passcode).then(()=>alert("Copied! / คัดลอกแล้ว!"));};
    return(
      <div style={S.card} className="fade-up">
        <div style={{textAlign:"center",padding:"10px 0 18px"}} className="pop-in"><div style={{fontSize:56}}>🎉</div><h3 style={{fontSize:22,color:"#1B4965",margin:"8px 0 2px",fontFamily:"'DM Serif Display',serif"}}>Booking Confirmed!</h3><p style={{color:"#888",fontSize:13}}>การจองของคุณได้รับการยืนยันเรียบร้อยแล้ว</p></div>
        <div style={S.receipt}><div style={S.receiptHead}><div><div style={{fontWeight:700}}>RELO 2026 Showcase Project</div><div style={{fontSize:11,opacity:.7,marginTop:2}}>Booking Confirmation</div></div><div style={{fontSize:11,opacity:.7}}>{new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</div></div><div style={{padding:"18px 20px"}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}><div><div style={S.receiptLabel}>TEAM</div><div style={S.receiptVal}>{team}</div></div><div><div style={S.receiptLabel}>BOOKED BY</div><div style={S.receiptVal}>{booker}</div></div></div><div style={S.receiptLabel}>SCHEDULED SESSIONS ({bs.length})</div><div style={{marginTop:8}}>{bs.map(slot=>{const f=FI(slot.facilitator);return(<div key={slot.id} style={{...S.receiptSlot,borderLeftColor:f.color}}><div style={{display:"flex",alignItems:"center",gap:6}}><span>{f.icon}</span><strong style={{color:f.color,fontSize:14}}>{f.name}</strong></div><div style={{fontSize:14,color:"#444",marginTop:2}}>📅 {slot.dateLabel} ({slot.day}) · 🕐 {slot.time}</div></div>);})}</div></div></div>
        <ZoomCard/>
        <div style={{display:"flex",gap:10,marginTop:20,flexWrap:"wrap"}}><button style={S.btnP} onClick={dlICS}>📥 Download Calendar (.ics)</button><button style={S.btnS} onClick={copy}>📋 Copy Summary</button><button style={{...S.btnS,color:"#C1121F",borderColor:"#C1121F33"}} onClick={handleReset}>↺ New Booking</button></div>
      </div>);
  }

  if(step===1){const ok=team.trim().length>=2&&booker.trim().length>=2;return(<React.Fragment><Steps step={1}/><div style={S.card} className="fade-up"><h3 style={S.cardT}>👥 Team Information / ข้อมูลทีม</h3>{error&&<div style={S.errBox}>{error}</div>}<div style={S.fg}><label style={S.label}>Team Name / ชื่อทีม <span style={{color:"#C1121F"}}>*</span></label><input style={S.input} placeholder="e.g., Team Alpha" value={team} onChange={e=>setTeam(e.target.value)}/></div><div style={S.fg}><label style={S.label}>Booked by (Name) / ชื่อผู้จอง <span style={{color:"#C1121F"}}>*</span></label><input style={S.input} placeholder="e.g., Somchai Jaidee" value={booker} onChange={e=>setBooker(e.target.value)}/></div><button style={{...S.btnP,opacity:ok?1:.4,cursor:ok?"pointer":"not-allowed"}} disabled={!ok} onClick={()=>setStep(2)}>Continue to Slot Selection →</button></div></React.Fragment>);}

  if(step===2){return(<React.Fragment><Steps step={2}/>{error&&<div style={{...S.errBox,marginBottom:16}}>{error}</div>}<SlotSelector selected={selected} setSelected={setSelected} bookings={bookings} slotPool={pool} onNext={()=>{setError(null);setStep(3);}} onBack={()=>setStep(1)}/></React.Fragment>);}

  if(step===3){const bs=SLOTS.filter(s=>selected.includes(s.id));return(<React.Fragment><Steps step={3}/><div style={S.card} className="fade-up"><h3 style={S.cardT}>✅ Review & Confirm / ตรวจสอบและยืนยัน</h3>{error&&<div style={S.errBox}>{error}</div>}<div style={S.sumBox}><div style={S.sumRow}><span style={S.sumL}>Team</span><span style={S.sumV}>{team}</span></div><div style={S.sumRow}><span style={S.sumL}>Booked by</span><span style={S.sumV}>{booker}</span></div><div style={{...S.sumRow,borderBottom:"none"}}><span style={S.sumL}>Sessions</span><span style={S.sumV}>{selected.length} slot{selected.length!==1?"s":""}</span></div></div><div style={{marginTop:14}}>{bs.map(slot=>{const f=FI(slot.facilitator);return(<div key={slot.id} style={{...S.cfSlot,borderLeftColor:f.color}}><div style={{display:"flex",alignItems:"center",gap:6}}><span>{f.icon}</span><strong style={{color:f.color}}>{f.name}</strong></div><div style={{fontSize:14,color:"#444",marginTop:3}}>📅 {slot.dateLabel} ({slot.day}) · 🕐 {slot.time}</div></div>);})}</div><ZoomCard compact/><div style={{display:"flex",gap:10,marginTop:20,flexWrap:"wrap"}}><button style={S.btnS} onClick={()=>setStep(2)}>← Edit Selection</button><button style={{...S.btnP,opacity:saving?.6:1}} disabled={saving} onClick={handleConfirm}>{saving?"Saving…":"Confirm Booking ✓"}</button></div></div></React.Fragment>);}
  return null;
}

/* ═══ MANAGE BOOKING PAGE ═══ */
function ManagePage({bookings,loading,cancelSlot,cancelAll}){
  const [teamQuery,setTeamQuery]=useState("");
  const [searched,setSearched]=useState(false);
  const [msg,setMsg]=useState(null);
  const [cancelling,setCancelling]=useState(null);

  const teamSlots=useMemo(()=>{
    if(!searched||!teamQuery.trim())return[];
    const q=teamQuery.trim().toLowerCase();
    return Object.entries(bookings).filter(([id,info])=>info&&info.team&&info.team.toLowerCase()===q).map(([id,info])=>({slotId:id,slot:SLOTS.find(s=>s.id===id),...info})).filter(x=>x.slot).sort((a,b)=>a.slot.date.localeCompare(b.slot.date)||a.slot.start.localeCompare(b.slot.start));
  },[bookings,searched,teamQuery]);

  const teamInfo=teamSlots.length>0?{team:teamSlots[0].team,booker:teamSlots[0].booker}:null;

  const handleCancel=async(slotId)=>{
    if(!confirm("Cancel this slot? It will become available for other teams.\nยกเลิก slot นี้? slot จะว่างให้ทีมอื่นจองได้"))return;
    setCancelling(slotId);setMsg(null);
    try{await cancelSlot(slotId);setMsg({type:"success",text:"Slot cancelled successfully. / ยกเลิก slot สำเร็จ"});}
    catch(e){setMsg({type:"error",text:"Failed to cancel. Please try again. / ยกเลิกไม่สำเร็จ"});}
    setCancelling(null);
  };

  const handleCancelAll=async()=>{
    if(!confirm("Cancel ALL "+teamSlots.length+" slots for "+teamInfo.team+"?\nยกเลิกทั้งหมด "+teamSlots.length+" slots?"))return;
    setCancelling("all");setMsg(null);
    try{await cancelAll(teamSlots.map(x=>x.slotId));setMsg({type:"success",text:"All slots cancelled. / ยกเลิกทั้งหมดสำเร็จ"});}
    catch(e){setMsg({type:"error",text:"Failed. Please try again. / ล้มเหลว กรุณาลองอีกครั้ง"});}
    setCancelling(null);
  };

  if(loading)return <div style={S.card}><p style={{textAlign:"center",color:"#999",padding:32}}>Loading…</p></div>;

  return(
    <div>
      <div style={S.card} className="fade-up">
        <h3 style={S.cardT}>📝 Manage Your Booking / แก้ไข-ยกเลิกการจอง</h3>
        <p style={{color:"#666",fontSize:14,marginBottom:16,lineHeight:1.6}}>Enter your team name to view and manage your bookings. You can cancel individual slots or all at once.<br/><span style={{color:"#999",fontSize:13}}>พิมพ์ชื่อทีมเพื่อดูและจัดการการจอง สามารถยกเลิกทีละ slot หรือทั้งหมดได้</span></p>

        <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div style={{flex:"1 1 250px"}}>
            <label style={S.label}>Team Name / ชื่อทีม</label>
            <input style={S.input} placeholder="e.g., Team Alpha" value={teamQuery} onChange={e=>{setTeamQuery(e.target.value);setSearched(false);setMsg(null);}}
              onKeyDown={e=>{if(e.key==="Enter"&&teamQuery.trim())setSearched(true);}}/>
          </div>
          <button style={{...S.btnP,marginBottom:0,opacity:teamQuery.trim()?.length>=2?1:.4}} disabled={teamQuery.trim().length<2} onClick={()=>{setSearched(true);setMsg(null);}}>
            🔍 Look Up
          </button>
        </div>
      </div>

      {searched&&(
        <div style={{...S.card,marginTop:16}} className="fade-up">
          {msg&&<div style={msg.type==="success"?S.successBox:S.errBox}>{msg.text}</div>}

          {teamSlots.length===0?(
            <div style={{textAlign:"center",padding:"24px 0"}}>
              <div style={{fontSize:40,marginBottom:8}}>🔍</div>
              <p style={{color:"#888",fontSize:15,fontWeight:500}}>No bookings found for "{teamQuery}"</p>
              <p style={{color:"#AAA",fontSize:13,marginTop:4}}>ไม่พบการจองสำหรับทีม "{teamQuery}" · ตรวจสอบชื่อทีมอีกครั้ง</p>
              <p style={{color:"#AAA",fontSize:12,marginTop:8}}>Make sure the team name matches exactly what was used when booking.</p>
            </div>
          ):(
            <React.Fragment>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
                <div>
                  <h4 style={{fontSize:17,color:"#1B4965",fontFamily:"'DM Serif Display',serif",fontWeight:400}}>{teamInfo.team}</h4>
                  <p style={{fontSize:13,color:"#888"}}>Booked by {teamInfo.booker} · {teamSlots.length} session{teamSlots.length!==1?"s":""}</p>
                </div>
                {teamSlots.length>1&&(
                  <button style={{...S.btnDanger,opacity:cancelling?.5:1}} disabled={!!cancelling} onClick={handleCancelAll}>
                    {cancelling==="all"?"Cancelling…":"🗑️ Cancel All Slots"}
                  </button>
                )}
              </div>

              {teamSlots.map(({slotId,slot})=>{
                const f=FI(slot.facilitator);
                return(
                  <div key={slotId} style={{...S.manageSlot,borderLeftColor:f.color}}>
                    <div style={{flex:"1 1 auto",minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                        <span>{f.icon}</span><strong style={{color:f.color,fontSize:14}}>{f.name}</strong>
                      </div>
                      <div style={{fontSize:14,color:"#444"}}>📅 {slot.dateLabel} ({slot.day}) · 🕐 {slot.time}</div>
                    </div>
                    <button style={{...S.btnDanger,opacity:cancelling===slotId?.5:1,whiteSpace:"nowrap"}} disabled={!!cancelling} onClick={()=>handleCancel(slotId)}>
                      {cancelling===slotId?"Cancelling…":"✕ Cancel"}
                    </button>
                  </div>
                );
              })}

              <div style={{marginTop:16,padding:"12px 16px",background:"#F5F9FC",borderRadius:10,fontSize:13,color:"#555",lineHeight:1.6}}>
                💡 <strong>Tip:</strong> After cancelling, slots become instantly available for other teams. You can book new slots from the <strong>Book a Slot</strong> tab.<br/>
                <span style={{color:"#888"}}>เมื่อยกเลิกแล้ว slot จะว่างทันที สามารถจองใหม่ได้ที่แท็บ "Book a Slot"</span>
              </div>
            </React.Fragment>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══ DASHBOARD ═══ */
function Dashboard({bookings,loading}){
  const [filter,setFilter]=useState("all");const [statusFilter,setStatusFilter]=useState("all");
  const stats=useMemo(()=>{const b=SLOTS.filter(s=>bookings[s.id]).length;return{total:SLOTS.length,booked:b,avail:SLOTS.length-b};},[bookings]);
  const grouped=useMemo(()=>{let fl=SLOTS;if(filter!=="all")fl=fl.filter(s=>s.facilitator===filter);if(statusFilter==="available")fl=fl.filter(s=>!bookings[s.id]);if(statusFilter==="booked")fl=fl.filter(s=>bookings[s.id]);const g={};fl.forEach(s=>{if(!g[s.dateLabel])g[s.dateLabel]={date:s.date,day:s.day,label:s.dateLabel,slots:[]};g[s.dateLabel].slots.push(s);});return Object.values(g).sort((a,b)=>a.date.localeCompare(b.date));},[filter,statusFilter,bookings]);
  const teamBookings=useMemo(()=>{const teams={};Object.entries(bookings).forEach(([id,info])=>{if(!info||!info.team)return;const k=info.team;if(!teams[k])teams[k]={team:info.team,booker:info.booker,ts:info.ts,slots:[]};const sl=SLOTS.find(s=>s.id===id);if(sl)teams[k].slots.push(sl);});return Object.values(teams).sort((a,b)=>a.team.localeCompare(b.team));},[bookings]);
  const facStats=useMemo(()=>FACILITATORS.map(f=>{const t=SLOTS.filter(s=>s.facilitator===f.id).length;const b=SLOTS.filter(s=>s.facilitator===f.id&&bookings[s.id]).length;return{...f,total:t,booked:b};}),[bookings]);
  if(loading)return <div style={S.card}><p style={{textAlign:"center",color:"#999",padding:32}}>Loading…</p></div>;

  return(
    <div>
      <div style={S.card} className="fade-up">
        <h3 style={S.cardT}>📊 Booking Overview / ภาพรวมการจอง</h3>
        <div style={S.overviewGrid}><div style={{...S.overviewItem,borderLeftColor:"#1B4965"}}><div style={{fontSize:28,fontWeight:800,color:"#1B4965"}}>{stats.total}</div><div style={{fontSize:13,color:"#888"}}>Total Slots</div></div><div style={{...S.overviewItem,borderLeftColor:"#2D6A4F"}}><div style={{fontSize:28,fontWeight:800,color:"#2D6A4F"}}>{stats.avail}</div><div style={{fontSize:13,color:"#888"}}>Available</div></div><div style={{...S.overviewItem,borderLeftColor:"#C1121F"}}><div style={{fontSize:28,fontWeight:800,color:"#C1121F"}}>{stats.booked}</div><div style={{fontSize:13,color:"#888"}}>Booked</div></div><div style={{...S.overviewItem,borderLeftColor:"#7B2D8B"}}><div style={{fontSize:28,fontWeight:800,color:"#7B2D8B"}}>{teamBookings.length}</div><div style={{fontSize:13,color:"#888"}}>Teams</div></div></div>
        <div style={{marginTop:16}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:6}}><span>Overall Capacity</span><span>{stats.total>0?Math.round(stats.booked/stats.total*100):0}% booked</span></div><div style={{height:10,background:"#ECEAE5",borderRadius:8,overflow:"hidden"}}><div style={{width:(stats.total>0?stats.booked/stats.total*100:0)+"%",height:"100%",background:"linear-gradient(90deg,#2D6A4F,#1B4965)",borderRadius:8,transition:"width .5s"}}/></div></div>
        <div style={{marginTop:20}}>{facStats.map(f=>(<div key={f.id} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{fontWeight:600,color:f.color}}>{f.icon} {f.name}</span><span style={{color:"#888"}}>{f.booked}/{f.total} booked</span></div><div style={{height:7,background:"#ECEAE5",borderRadius:6,overflow:"hidden"}}><div style={{width:(f.total>0?f.booked/f.total*100:0)+"%",height:"100%",background:f.color,borderRadius:6,transition:"width .5s"}}/></div></div>))}</div>
      </div>

      {teamBookings.length>0&&(<div style={{...S.card,marginTop:16}} className="fade-up fade-d1"><h3 style={S.cardT}>👥 Bookings by Team / การจองตามทีม</h3>{teamBookings.map((tb,i)=>(<div key={i} style={S.teamCard}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}><div><div style={{fontWeight:700,fontSize:16,color:"#1B4965"}}>{tb.team}</div><div style={{fontSize:12,color:"#888"}}>Booked by {tb.booker} · {new Date(tb.ts).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</div></div><span style={S.teamCount}>{tb.slots.length} session{tb.slots.length!==1?"s":""}</span></div>{tb.slots.sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start)).map(slot=>{const f=FI(slot.facilitator);return(<div key={slot.id} style={{...S.teamSlot,borderLeftColor:f.color}}><span style={{minWidth:110}}>{f.icon} {f.name}</span><span style={{color:"#555",minWidth:90}}>{slot.dateLabel} ({slot.day})</span><span style={{fontWeight:600}}>{slot.time}</span></div>);})}</div>))}</div>)}

      <div style={{...S.card,marginTop:16}} className="fade-up fade-d2">
        <h3 style={S.cardT}>🗓️ All Time Slots / ตารางเวลาทั้งหมด</h3>
        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>{[{id:"all",l:"All Facilitators"},...FACILITATORS.map(f=>({id:f.id,l:f.icon+" "+f.name}))].map(o=>(<button key={o.id} onClick={()=>setFilter(o.id)} style={{...S.filterBtn,background:filter===o.id?"#1B4965":"#F0EEEA",color:filter===o.id?"#fff":"#555"}}>{o.l}</button>))}</div>
        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>{[{id:"all",l:"All Status"},{id:"available",l:"🟢 Available"},{id:"booked",l:"🔴 Booked"}].map(o=>(<button key={o.id} onClick={()=>setStatusFilter(o.id)} style={{...S.filterBtn,background:statusFilter===o.id?"#1B4965":"#F0EEEA",color:statusFilter===o.id?"#fff":"#555"}}>{o.l}</button>))}</div>
        {grouped.length===0&&<p style={{textAlign:"center",color:"#AAA",padding:32}}>No slots match your filters.</p>}
        {grouped.map(grp=>(<div key={grp.label} style={{marginBottom:24}}><div style={S.dateHdr}><span style={{fontWeight:700,fontSize:16,color:"#1B4965"}}>{grp.label}</span><span style={S.dayBadge}>{grp.day}</span></div>{grp.slots.map(slot=>{const f=FI(slot.facilitator);const b=bookings[slot.id];return(<div key={slot.id} style={{...S.dashSlot,borderLeftColor:b?"#C1121F":"#2D6A4F"}}><div style={{display:"flex",alignItems:"center",gap:8,flex:"1 1 140px",minWidth:0}}><span>{f.icon}</span><strong style={{color:f.color,fontSize:14}}>{f.name}</strong></div><div style={{fontWeight:600,fontSize:15,flex:"0 0 auto"}}>{slot.time}</div><div style={{flex:"1 1 180px",minWidth:0,textAlign:"right"}}>{b?(<span style={{fontSize:13}}><span style={S.lockedTeamInline}>🔒 {b.team}</span><span style={{color:"#AAA",fontSize:11,marginLeft:8}}>by {b.booker}</span></span>):(<span style={S.availBadge}>✓ Available</span>)}</div></div>);})}</div>))}
      </div>
      <div style={{...S.card,marginTop:16}}><h3 style={S.cardT}>📹 Zoom Details for All Sessions</h3><ZoomCard/></div>
    </div>
  );
}

/* ═══ ROOT ═══ */
function App(){
  const [page,setPage]=useState("book");
  const {bookings,loading,connected,book,cancelSlot,cancelAll}=useBookings();
  return(
    <div style={{minHeight:"100vh"}}>
      <Header page={page} setPage={setPage} connected={connected}/>
      <main style={S.main}>
        {page==="book"&&<BookingPage key="r1" bookings={bookings} loading={loading} book={book} slotPool={SLOTS_R1} roundLabel="Round 1"/>}
        {page==="book2"&&<BookingPage key="r2" bookings={bookings} loading={loading} book={book} slotPool={SLOTS_R2} roundLabel="Round 2"/>}
        {page==="manage"&&<ManagePage bookings={bookings} loading={loading} cancelSlot={cancelSlot} cancelAll={cancelAll}/>}
        {page==="dashboard"&&<Dashboard bookings={bookings} loading={loading}/>}
      </main>
      <footer style={S.footer}><div>RELO 2026 Showcase Project · Thailand TESOL & RELO Thailand</div><div style={{fontSize:11,marginTop:3,opacity:.5}}>All consultations via Zoom · 30 min per session · Real-time sync</div></footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
